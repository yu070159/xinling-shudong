    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
        }

        .page-header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .page-title {
            font-size: 2.5rem;
            color: var(--accent);
            margin: 0 0 10px 0;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .page-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .controls-container {
            max-width: 1200px;
            margin: 0 auto 40px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            background: var(--bg-input);
            border: 1px solid var(--border-medium);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .filter-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-medium);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: var(--accent-glow);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            font-weight: bold;
        }

        .grid-container {
            max-width: 1200px;
            margin: 0 auto 80px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .book-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }

        .tag {
            align-self: flex-start;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--accent-glow);
            color: var(--accent);
            margin-bottom: 12px;
        }

        .book-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: var(--text-primary);
        }

        .book-author {
            font-size: 0.9rem;
            color: var(--accent);
            margin: 0 0 16px 0;
            opacity: 0.9;
        }

        .book-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0 0 16px 0;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-reason {
            font-size: 0.85rem;
            background: var(--bg-input);
            padding: 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            border-left: 3px solid var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            grid-column: 1 / -1;
            display: none;
        }

        .empty-state-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        .blinking-cursor::after {
            content: '|';
            color: var(--accent);
            opacity: 0.8;
            margin-left: 4px;
            font-weight: 300;
            animation: blinkCursor 0.8s step-end infinite;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #4caf50;
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 500;
            z-index: 2000;
            box-shadow: 0 6px 24px rgba(76, 175, 80, 0.35);
            pointer-events: none;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast-notification.hide {
            opacity: 0;
            transform: translateX(-50%) translateY(-120px);
        }

        .recommend-btn {
            background: transparent;
            border: 1px dashed var(--accent);
            color: var(--accent);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: none;
        }
        .recommend-btn:hover {
            background: var(--accent-glow);
            border-style: solid;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal-panel {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 480px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin: 0 0 20px;
            text-align: center;
        }
        .modal-field { margin-bottom: 16px; }
        .modal-field label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .modal-field input, .modal-field textarea, .modal-field select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border-medium);
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
        }
        .modal-field textarea { resize: vertical; min-height: 80px; }
        .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus {
            border-color: var(--accent);
        }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        .btn-cancel {
            background: var(--bg-input); border: 1px solid var(--border-medium);
            color: var(--text-secondary); padding: 10px 24px; border-radius: 24px; cursor: pointer;
        }
        .btn-submit {
            background: var(--accent); border: none; color: white;
            padding: 10px 24px; border-radius: 24px; cursor: pointer; font-weight: bold;
        }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 900px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 18px;
                padding: 0 16px;
            }
        }

        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: 1fr;
                gap: 14px;
                padding: 0 12px;
            }
            .page-title {
                font-size: 2rem;
            }
            .page-header {
                padding: 40px 16px 30px;
            }
            .page-subtitle {
                font-size: 0.95rem;
                padding: 0 12px;
            }
            .controls-container {
                padding: 0 12px;
                gap: 14px;
            }
            .search-box {
                max-width: 100%;
            }
            .search-box input {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
            .filter-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            .category-filters {
                gap: 8px;
            }
            .book-card {
                padding: 18px;
            }
            .book-title {
                font-size: 1.1rem;
            }
            .modal-panel {
                padding: 24px 18px;
                width: 94%;
                border-radius: 14px;
            }
            .toast-notification {
                font-size: 0.85rem;
                padding: 12px 22px;
                top: 12px;
            }
        }
    </style>
</head>
<body>

    <section class="page-header">
        <h1 class="page-title">书洞</h1>
        <p class="page-subtitle">在文字中，找到照亮内心的光</p>
    </section>

    <section class="controls-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="寻找相似的回声... (搜索书名或作者)">
        </div>
        <button id="showRecommendBtn" class="recommend-btn">+ 推荐资源</button>
        <div class="category-filters" id="filterContainer">
            <button class="filter-btn active" data-category="全部">全部</button>
            <button class="filter-btn" data-category="经典入门">经典入门</button>
            <button class="filter-btn" data-category="自我成长">自我成长</button>
            <button class="filter-btn" data-category="认知行为">认知行为</button>
            <button class="filter-btn" data-category="免费资源">免费资源</button>
            <button class="filter-btn" data-category="公开课">公开课</button>
        </div>
    </section>

    <section class="grid-container" id="booksGrid"></section>

    <div class="empty-state" id="emptyState">
        <div class="empty-state-text blinking-cursor">书洞还在收集落叶，稍后会装满故事</div>
    </div>

    <script>
        // 初始化 Supabase
        const sb = window.TreeHole.supabase;


        let currentCategory = "全部";
        let currentSearchQuery = "";
        let allResources = [];

        const booksGrid = document.getElementById('booksGrid');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const showRecommendBtn = document.getElementById('showRecommendBtn');
        const recommendModal = document.getElementById('recommendModal');

        // 从 Supabase 加载资源，失败则降级到静态数据
        async function loadResources() {
            try {
                const { data, error } = await sb
                    .from('resources')
                    .select('title,author,description,reason,category,link')
                    .order('created_at', { ascending: false });
                if (error) throw error;
                if (data && data.length > 0) {
                    allResources = data.map(r => ({
                        title: r.title,
                        author: r.author,
                        desc: r.description,
                        reason: r.reason,
                        category: r.category,
                        link: r.link
                    }));
                    return;
                }
            } catch (err) {
                console.warn('Supabase 资源加载失败，使用静态数据:', err.message);
            }
            allResources = libraryData;
        }

        function renderCards() {
            const filteredData = allResources.filter(item => {
                const matchCategory = currentCategory === "全部" || item.category === currentCategory;
                const matchSearch = item.title.toLowerCase().includes(currentSearchQuery) || 
                                    item.author.toLowerCase().includes(currentSearchQuery);
                return matchCategory && matchSearch;
            });

            booksGrid.innerHTML = '';

            if (filteredData.length === 0) {
                booksGrid.style.display = 'none';
                emptyState.style.display = 'block';
                
                const emptyText = emptyState.querySelector('.empty-state-text');
                emptyText.classList.add('blinking-cursor');
                setTimeout(() => {
                    emptyText.classList.remove('blinking-cursor');
                }, 3500);
            } else {
                booksGrid.style.display = 'grid';
                emptyState.style.display = 'none';

                filteredData.forEach(item => {
                    const card = document.createElement('a');
                    card.className = 'book-card';
                    card.href = item.link;
                    card.target = "_blank";
                    
                    card.innerHTML = `
                        <span class="tag">${item.category}</span>
                        <h3 class="book-title">${item.title}</h3>
                        <p class="book-author">${item.author}</p>
                        <p class="book-desc">${item.desc}</p>
                        <div class="book-reason">${item.reason}</div>
                    `;
                    booksGrid.appendChild(card);
                });
            }
        }

        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.getAttribute('data-category');
                renderCards();
            });
        });

        let searchDebounceTimer = null;
        searchInput.addEventListener('input', (e) => {
            currentSearchQuery = e.target.value.toLowerCase().trim();
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => renderCards(), 300);
        });

        function showToast(message) {
            const toast = document.getElementById('submitToast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.remove('hide');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.add('hide');
                toast.classList.remove('show');
            }, 2000);
        }

        // 推荐弹窗逻辑（DOMContentLoaded 后绑定，避免元素未加载）
        window.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('recommendModal');
            const cancelBtn = document.getElementById('cancelRecommend');
            const submitBtn = document.getElementById('submitRecommend');
            const recBtn = document.getElementById('showRecommendBtn');

            recBtn.addEventListener('click', () => {
                modal.classList.add('active');
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });

            cancelBtn.addEventListener('click', () => {
                modal.classList.remove('active');
            });

            submitBtn.addEventListener('click', async function() {
            const title = document.getElementById('recTitle').value.trim();
            const author = document.getElementById('recAuthor').value.trim();
            const category = document.getElementById('recCategory').value;
            const desc = document.getElementById('recDesc').value.trim();
            const reason = document.getElementById('recReason').value.trim();
            const link = document.getElementById('recLink').value.trim();

            if (!title || !author || !category || !desc || !reason || !link) {
                alert('请填写所有必填字段');
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                const { data: { user } } = await sb.auth.getUser();
                if (!user) { alert('请先登录'); btn.disabled = false; btn.textContent = '提交推荐'; return; }

                const { error } = await sb.from('resources').insert({
                    title, author, category,
                    description: desc, reason, link,
                    submitted_by: user.id
                });

                if (error) throw error;

                allResources.unshift({ title, author, desc, reason, category, link });
                modal.classList.remove('active');
                ['recTitle','recAuthor','recCategory','recDesc','recReason','recLink'].forEach(id => {
                    document.getElementById(id).value = '';
                });
                currentCategory = '全部';
                document.querySelector('.filter-btn.active')?.classList.remove('active');
                document.querySelector('.filter-btn[data-category="全部"]')?.classList.add('active');
                renderCards();
                showToast('推荐已提交，感谢分享');
            } catch (err) {
                alert('推荐失败: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '提交推荐';
            }
        });  // submitBtn click

        });  // DOMContentLoaded 弹窗绑定

        // 导航栏登录状态 + 加载资源
        window.addEventListener('DOMContentLoaded', async () => {
            const navGuest = document.getElementById('navGuest');
            const navLoggedIn = document.getElementById('navLoggedIn');
            const navNickname = document.getElementById('navNickname');
            const navLogout = document.getElementById('navLogout');

            let isLoggedIn = false;

            try {
                const { data: { user } } = await sb.auth.getUser();
                if (user) {
                    isLoggedIn = true;
                    navGuest.style.display = 'none';
                    navLoggedIn.style.display = 'inline';
                    const { data: profile } = await sb.from('profiles').select('nickname').eq('user_id', user.id).single();
                    navNickname.textContent = profile?.nickname || '树友';
                    navLogout.addEventListener('click', (e) => {
                        e.preventDefault();
                        sb.auth.signOut().then(() => window.location.href = 'welcome.html');
                    });
                }
            } catch (err) {
                console.warn('导航栏状态检查失败:', err.message);
            }

            if (isLoggedIn) {
                showRecommendBtn.style.display = 'inline-block';
            }

            await loadResources();
            renderCards();
        });
    </script>

    <div class="modal-overlay" id="recommendModal">
        <div class="modal-panel">
            <h3 class="modal-title">推荐资源</h3>
            <div class="modal-field">
                <label>资源名称 *</label>
                <input type="text" id="recTitle" placeholder="书名或资源名称" maxlength="100">
            </div>
            <div class="modal-field">
                <label>作者/来源 *</label>
                <input type="text" id="recAuthor" placeholder="作者或机构名称" maxlength="50">
            </div>
            <div class="modal-field">
                <label>分类 *</label>
                <select id="recCategory">
                    <option value="">请选择</option>
                    <option value="经典入门">经典入门</option>
                    <option value="自我成长">自我成长</option>
                    <option value="认知行为">认知行为</option>
                    <option value="免费资源">免费资源</option>
                    <option value="公开课">公开课</option>
                </select>
            </div>
            <div class="modal-field">
                <label>简介 *</label>
                <textarea id="recDesc" placeholder="一句话介绍这个资源" maxlength="200"></textarea>
            </div>
            <div class="modal-field">
                <label>推荐理由 *</label>
                <textarea id="recReason" placeholder="为什么推荐给树友？" maxlength="300"></textarea>
            </div>
            <div class="modal-field">
                <label>链接 *</label>
                <input type="url" id="recLink" placeholder="https://..." maxlength="500">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelRecommend">取消</button>
                <button class="btn-submit" id="submitRecommend">提交推荐</button>
            </div>
        </div>
    </div>

    <div class="toast-notification" id="submitToast"></div>

    <script src="ai-float.js"></script>
    <script src="user-popup.js"></script>
</body>
