<body>
  <header class="forest-header">
      <a href="index.html" class="forest-logo">
          <span class="logo-icon">🌳</span>
          <span class="logo-text">心灵树洞</span>
      </a>
      <nav class="forest-nav">
          <a href="index.html">广场</a>
          <a href="books.html">书洞</a>
          <a href="shuling.html">树灵</a>
          <a href="chat.html">树友对话</a>
      </nav>
      <div class="forest-user-actions" id="navUserArea">
          <span id="navGuest">
              <a href="login.html">登录</a>
              <a href="register.html">注册</a>
          </span>
          <span id="navLoggedIn" style="display:none">
              <span class="user-greeting" id="navNickname"></span>
              <a href="profile.html">个人中心</a>
              <a href="feedback.html">反馈</a>
              <a href="#" class="logout-btn" id="navLogout">退出</a>
          </span>
      </div>
  </header>
  <div class="container">
    <div class="login-container">
      <div class="login-icon">🌳</div>
      <h2 class="login-title">欢迎回来</h2>
      <div id="loginError" class="smooth-text"></div>
      <input type="email" id="loginEmail" class="login-input" placeholder="输入你的邮箱">
      <input type="password" id="loginPassword" class="login-input" placeholder="密码">
      <button id="loginBtn">进入树洞</button>
      <div class="login-footer">
        <div class="login-hint">使用注册时的邮箱登录</div>
        还没有账号？<a href="register.html">注册</a>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const loginBtn = document.getElementById('loginBtn');
      const loginEmail = document.getElementById('loginEmail');
      const loginPassword = document.getElementById('loginPassword');
      const loginError = document.getElementById('loginError');
      
      const navGuest = document.getElementById('navGuest');
      const navLoggedIn = document.getElementById('navLoggedIn');
      const navNickname = document.getElementById('navNickname');
      const navLogout = document.getElementById('navLogout');
      
      if (navGuest && navLoggedIn) {
        const user = await TreeHole.getCurrentUser();
        if (user) {
          navGuest.style.display = 'none';
          navLoggedIn.style.display = 'inline';
          const profile = await TreeHole.getUserProfile();
          navNickname.textContent = profile?.nickname || '树友';
        } else {
          navGuest.style.display = 'inline';
          navLoggedIn.style.display = 'none';
        }
      }
      
      if (navLogout) {
        navLogout.addEventListener('click', (e) => {
          e.preventDefault();
          TreeHole.signOut();
        });
      }
      
      const handleLogin = async () => {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();
        
        loginError.style.display = 'none';
        
        if (!email || !password) {
          updateTextSmoothly('loginError', '请填写邮箱和密码');
          loginError.style.display = 'block';
          return;
        }

        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          updateTextSmoothly('loginError', '请输入正确的邮箱格式');
          loginError.style.display = 'block';
          return;
        }
        
        const originalText = loginBtn.textContent;
        loginBtn.textContent = '正在进入...';
        loginBtn.disabled = true;
        
        const result = await TreeHole.signIn(email, password);
        
        loginBtn.textContent = originalText;
        loginBtn.disabled = false;
        
        if (result.success) {
          window.location.href = 'index.html';
        } else {
          updateTextSmoothly('loginError', result.error || '登录失败，请重试');
          loginError.style.display = 'block';
        }
      };
      
      loginBtn.addEventListener('click', handleLogin);
      
      [loginEmail, loginPassword].forEach(input => {
        input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            handleLogin();
          }
        });
      });
    });

    // updateTextSmoothly 由 utils.js 全局提供
  </script>

  <script src="ai-float.js"></script>
  <script src="user-popup.js"></script>
</body>
</html>
