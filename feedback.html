<body>
  <header class="forest-header">
      <a href="index.html" class="forest-logo">

      </nav>
      <div class="forest-user-actions" id="navUserArea">
          <span id="navGuest">
              <a href="login.html">登录</a>
              <a href="register.html">注册</a>
          </span>
          <span id="navLoggedIn" style="display:none">
              <span class="user-greeting" id="navNickname"></span>
              <a href="profile.html">个人中心</a>
              <a href="feedback.html">反馈</a>
              <a href="#" class="logout-btn" id="navLogout">退出</a>
          </span>
      </div>
  </header>

  <div class="container">
    <div class="feedback-container">
      <h1 class="feedback-title">反馈与建议</h1>
      <p class="feedback-subtitle">你的意见能帮助树洞变得更好</p>
      
      <div id="feedbackMsg" class="smooth-text"></div>
      
      <textarea id="feedbackContent" class="feedback-textarea" placeholder="请写下你的想法..."></textarea>
      
      <button id="submitBtn">发送反馈</button>
    </div>
  </div>

  <script>
    // 优先使用全局实例，不存在则降级创建
    const sb = window.TreeHole?.supabase || supabase.createClient(
      'https://oazntpskcghfxzcylnef.supabase.co',
      'sb_publishable_5i3Z5mF3VCwoEaXPaIJebA_55H6w13g'
    );

    async function getCurrentUser() {
      const { data: { user } } = await sb.auth.getUser();
      return user;
    }

    function signOut() {
      sb.auth.signOut().then(() => { window.location.href = 'welcome.html'; });
    }

    async function getUserProfile() {
      const user = await getCurrentUser();
      if (!user) return null;
      const { data } = await sb.from('profiles').select('*').eq('user_id', user.id).single();
      return data;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const navGuest = document.getElementById('navGuest');
      const navLoggedIn = document.getElementById('navLoggedIn');
      const navNickname = document.getElementById('navNickname');
      const navLogout = document.getElementById('navLogout');

      const user = await getCurrentUser();
      if (!user) {
        window.location.href = 'welcome.html';
        return;
      }

      navGuest.style.display = 'none';
      navLoggedIn.style.display = 'inline';
      const profile = await getUserProfile();
      navNickname.textContent = profile?.nickname || '树友';
      navLogout.addEventListener('click', (e) => { e.preventDefault(); signOut(); });

      const submitBtn = document.getElementById('submitBtn');
      const feedbackContent = document.getElementById('feedbackContent');
      const feedbackMsg = document.getElementById('feedbackMsg');

      submitBtn.addEventListener('click', async () => {
        const content = feedbackContent.value.trim();
        
        if (!content) {
          updateTextSmoothly('feedbackMsg', '请输入反馈内容');
          feedbackMsg.className = 'smooth-text error';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '发送中...';
        updateTextSmoothly('feedbackMsg', '');
        feedbackMsg.className = 'smooth-text';

        try {
          const { error } = await sb.from('feedbacks').insert({
            content,
            user_id: user.id
          });

          if (error) {
            throw new Error(error.message);
          }

          updateTextSmoothly('feedbackMsg', '✅ 反馈已发送，感谢你的建议');
          feedbackMsg.className = 'smooth-text success';
          feedbackContent.value = '';
        } catch (err) {
          updateTextSmoothly('feedbackMsg', '发送失败：' + err.message);
          feedbackMsg.className = 'smooth-text error';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = '发送反馈';
        }
      });
    });

    function updateTextSmoothly(elementId, newText) {
      const element = document.getElementById(elementId);
      if (!element) return;
      const currentText = element.textContent;
      if (currentText === newText) return;
      
      const duration = 200;
      const startTime = Date.now();
      
      function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        if (progress < 1) {
          element.style.opacity = 1 - progress;
          requestAnimationFrame(animate);
        } else {
          element.textContent = newText;
          element.style.opacity = 1;
        }
      }
      
      animate();
    }
  </script>

  <script src="ai-float.js"></script>
</body>
