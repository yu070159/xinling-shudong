  <div class="test-container">
    <h1 class="test-title">心理状态测评</h1>
    <p class="test-subtitle">PHQ-9 抑郁症状筛查量表（仅供参考，不能替代专业诊断）</p>
    <div class="disclaimer">⚠️ 本测评为匿名自评工具，结果仅用于自我了解，不能代替专业心理咨询或医学诊断。如有持续情绪困扰，请寻求专业帮助。</div>
    <div id="questionsContainer"></div>
    <button id="submitTestBtn" class="submit-btn">提交测评</button>
    <div id="resultContainer" style="display:none;"></div>
  </div>

  <script>
    // 优先使用全局实例，不存在则降级创建
    const sb = window.TreeHole?.supabase || supabase.createClient(
      'https://oazntpskcghfxzcylnef.supabase.co',
      'sb_publishable_5i3Z5mF3VCwoEaXPaIJebA_55H6w13g'
    );

    const questions = [
      { text: "做事时提不起劲或没有兴趣" },
      { text: "感到心情低落、沮丧或绝望" },
      { text: "入睡困难、睡不安稳或睡眠过多" },
      { text: "感觉疲倦或没有活力" },
      { text: "食欲不振或吃太多" },
      { text: "觉得自己很糟——或觉得自己很失败，或让自己或家人失望" },
      { text: "对事物专注有困难，例如阅读报纸或看电视时" },
      { text: "动作或说话速度缓慢到别人已经觉察？或正好相反——烦躁或坐立不安、动来动去的情况更胜平常" },
      { text: "有不如死掉或用某种方式伤害自己的念头" }
    ];

    const options = [
      { text: "完全没有", value: 0 },
      { text: "好几天", value: 1 },
      { text: "一半以上天数", value: 2 },
      { text: "几乎每天", value: 3 }
    ];

    let selectedValues = new Array(9).fill(null);

    function renderQuestions() {
      const container = document.getElementById('questionsContainer');
      container.innerHTML = '';
      questions.forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `
          <div class="question-text">${idx+1}. ${q.text}</div>
          <div class="options" id="q-${idx}">
            ${options.map((opt, optIdx) => `
              <div class="option-btn" data-value="${opt.value}" data-q="${idx}">${opt.text}</div>
            `).join('')}
          </div>
        `;
        container.appendChild(card);
      });

      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const qIdx = parseInt(this.dataset.q);
          const val = parseInt(this.dataset.value);
          document.querySelectorAll(`#q-${qIdx} .option-btn`).forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          selectedValues[qIdx] = val;
        });
      });
    }

    function calculateResult() {
      const total = selectedValues.reduce((sum, val) => sum + (val || 0), 0);
      let level, desc;
      if (total <= 4) { level = "无明显抑郁症状"; desc = "你的心理状态总体良好，继续保持积极的生活方式。"; }
      else if (total <= 9) { level = "轻度抑郁倾向"; desc = "你可能有轻度的情绪低落，建议多与朋友交流、增加运动或做一些让自己开心的事。"; }
      else if (total <= 14) { level = "中度抑郁倾向"; desc = "你的情绪困扰较为明显，建议尝试与信任的人聊聊，必要时可以寻求心理咨询。"; }
      else if (total <= 19) { level = "中重度抑郁倾向"; desc = "你正经历较严重的情绪痛苦，强烈建议联系心理咨询师或拨打心理援助热线（如：12355）。"; }
      else { level = "重度抑郁倾向"; desc = "你很可能正在承受极大的精神压力，请务必尽快寻求专业帮助，也可以联系身边的亲友陪伴支持。"; }
      return { total, level, desc };
    }

    document.getElementById('submitTestBtn').addEventListener('click', async () => {
      if (selectedValues.includes(null)) {
        alert('请回答所有题目后再提交');
        return;
      }
      const { total, level, desc } = calculateResult();
      const html = `
        <div class="result-box">
          <div class="result-score">${total} 分</div>
          <div class="result-level">${level}</div>
          <div class="result-desc">${desc}</div>
          <button id="saveScoreBtn" class="save-btn">保存结果到我的资料</button>
          <div id="saveMsg" class="smooth-text"></div>
        </div>
      `;
      const resultContainer = document.getElementById('resultContainer');
      resultContainer.innerHTML = html;
      resultContainer.style.display = 'block';
      document.getElementById('submitTestBtn').style.display = 'none';

      document.getElementById('saveScoreBtn').addEventListener('click', async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { alert('请先登录'); return; }
        const saveMsg = document.getElementById('saveMsg');
        try {
          const response = await fetch(
            `https://oazntpskcghfxzcylnef.supabase.co/rest/v1/profiles?user_id=eq.${session.user.id}`,
            {
              method: 'PATCH',
              headers: {
                'Content-Type': 'application/json',
                'apikey': 'sb_publishable_5i3Z5mF3VCwoEaXPaIJebA_55H6w13g',
                'Authorization': `Bearer ${session.access_token}`,
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({ phq9_score: total, phq9_date: new Date().toISOString() })
            }
          );
          if (!response.ok) throw new Error('保存失败');
          updateTextSmoothly('saveMsg', '✅ 结果已保存');
          saveMsg.className = 'smooth-text success';
          setTimeout(() => { window.location.href = 'profile.html'; }, 1500);
        } catch (err) {
          updateTextSmoothly('saveMsg', '保存失败：' + err.message);
          saveMsg.className = 'smooth-text error';
        }
      });
    });

    function updateTextSmoothly(elementId, newText) {
      const element = document.getElementById(elementId);
      if (!element) return;
      const currentText = element.textContent;
      if (currentText === newText) return;
      
      const duration = 200;
      const startTime = Date.now();
      
      function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        if (progress < 1) {
          element.style.opacity = 1 - progress;
          requestAnimationFrame(animate);
        } else {
          element.textContent = newText;
          element.style.opacity = 1;
        }
      }
      
      animate();
    }

    window.addEventListener('DOMContentLoaded', async () => {
      renderQuestions();
      const navGuest = document.getElementById('navGuest');
      const navLoggedIn = document.getElementById('navLoggedIn');
      const navNickname = document.getElementById('navNickname');
      const navLogout = document.getElementById('navLogout');
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        navGuest.style.display = 'none';
        navLoggedIn.style.display = 'inline';
        const { data: profile } = await sb.from('profiles').select('nickname').eq('user_id', user.id).single();
        navNickname.textContent = profile?.nickname || '树友';
        navLogout.addEventListener('click', (e) => { e.preventDefault(); sb.auth.signOut().then(() => window.location.href='welcome.html'); });
      }
    });
  </script>
