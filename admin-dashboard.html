<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员仪表盘 - 心灵树洞</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .dashboard-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 20px 40px;
      min-height: 100vh;
    }
    .dashboard-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .dashboard-header h1 {
      font-size: 28px;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .dashboard-header .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1;
      min-width: 140px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      padding: 18px 20px;
      text-align: center;
    }
    .stat-card .stat-num {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-card .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 240px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 10px 40px 10px 16px;
      border: 1px solid var(--border-medium);
      border-radius: 12px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .search-box .clear-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 50%;
      display: none;
    }
    .search-box .clear-btn.visible { display: block; }
    .search-box .clear-btn:hover { color: var(--text-primary); }
    .btn-export {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn-export:hover { transform: scale(1.02); }
    .btn-export:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-back {
      background: none;
      border: 1px solid var(--border-medium);
      color: var(--text-secondary);
      padding: 10px 20px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
      transition: 0.2s;
    }
    .btn-back:hover { border-color: var(--accent); color: var(--accent); }
    .user-group {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .user-group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: var(--bg-main);
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background 0.2s;
    }
    .user-group-header:hover { background: var(--bg-input); }
    .user-group-header .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-group-header .user-nickname {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .user-group-header .user-id {
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
    }
    .user-group-header .user-meta {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .user-group-header .expand-icon {
      transition: transform 0.2s;
      font-size: 12px;
      color: var(--text-muted);
    }
    .user-group.open .user-group-header .expand-icon {
      transform: rotate(180deg);
    }
    .user-group-body {
      display: none;
      max-height: 500px;
      overflow-y: auto;
    }
    .user-group.open .user-group-body { display: block; }
    .dialog-entry {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-light);
    }
    .dialog-entry:last-child { border-bottom: none; }
    .dialog-entry .dialog-meta {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }
    .dialog-entry .session-badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .session-badge.float { background: #e8f5e9; color: #2e7d32; }
    .session-badge.shuling { background: #e3f2fd; color: #1565c0; }
    .dialog-entry .dialog-msg {
      margin-bottom: 6px;
      font-size: 14px;
      line-height: 1.5;
    }
    .dialog-entry .dialog-msg .label {
      font-size: 11px;
      font-weight: 600;
      margin-right: 6px;
    }
    .dialog-entry .dialog-msg.user-msg .label { color: var(--accent); }
    .dialog-entry .dialog-msg.ai-msg .label { color: var(--warm-heart); }
    .dialog-entry .dialog-msg .content {
      color: var(--text-primary);
    }
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .loading-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
    }
    .error-state {
      text-align: center;
      padding: 32px 20px;
      color: var(--danger);
      background: var(--bg-card);
      border-radius: 14px;
    }
    .highlight {
      background: rgba(255, 200, 60, 0.3);
      padding: 1px 2px;
      border-radius: 2px;
    }

    .auth-overlay {
      display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center;
    }
    .auth-box {
      background: var(--bg-card); border-radius: 16px; padding: 32px 24px;
      max-width: 360px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.3); text-align: center;
    }
    .auth-box h2 { color: var(--accent); margin-bottom: 6px; font-size: 22px; }
    .auth-box .auth-sub { color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; }
    .auth-box input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border-medium);
      border-radius: 12px; background: var(--bg-input); color: var(--text-primary);
      font-size: 15px; outline: none; text-align: center; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .auth-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .auth-error { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }
    .auth-actions { display: flex; gap: 10px; margin-top: 16px; }
    .auth-actions button {
      flex: 1; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 500;
    }
    .auth-btn-confirm { background: var(--accent); color: white; border: none; transition: transform 0.2s; }
    .auth-btn-confirm:hover { transform: scale(1.02); }
    .auth-btn-cancel { background: none; border: 1px solid var(--border-medium); color: var(--text-secondary); }

    @media (max-width: 600px) {
      .dashboard-container { padding: 70px 12px 30px; }
      .stats-row { gap: 8px; }
      .stat-card { padding: 12px 14px; }
      .stat-card .stat-num { font-size: 24px; }
      .toolbar { flex-direction: column; }
      .search-box { min-width: auto; width: 100%; }
      .btn-export, .btn-back { width: 100%; text-align: center; }
      .dialog-entry { padding: 10px 14px; }
      .user-group-header { padding: 10px 14px; flex-direction: column; gap: 4px; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header class="forest-header">
    <a href="index.html" class="forest-logo">
      <span class="logo-icon">🌳</span>
      <span class="logo-text">心灵树洞</span>
    </a>
    <nav class="forest-nav">
      <a href="index.html">广场</a>
      <a href="books.html">书洞</a>
      <a href="shuling.html">树灵</a>
      <a href="chat.html">树友对话</a>
      <a href="mood-ring.html">年轮</a>
    </nav>
    <div class="forest-user-actions">
      <a href="index.html" id="backToHome">返回广场</a>
    </div>
  </header>

  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1>🛡️ 管理员仪表盘</h1>
      <p class="subtitle">AI 对话记录 · 按用户分组浏览</p>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-num" id="statDialogs">-</div>
        <div class="stat-label">总对话数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statUsers">-</div>
        <div class="stat-label">对话用户数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statFloat">-</div>
        <div class="stat-label">浮窗对话</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statShuling">-</div>
        <div class="stat-label">树灵对话</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索昵称或消息内容...">
        <button class="clear-btn" id="clearSearch">✕</button>
      </div>
      <button class="btn-export" id="btnExport">📥 导出 CSV</button>
      <button class="btn-back" id="btnBack">← 返回广场</button>
    </div>

    <div id="contentArea">
      <div class="loading-state">加载中...</div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="utils.js"></script>
  <script>
    (function() {
      var ADMIN_PASSWORD = '070929';
      var STORAGE_KEY = 'admin_authenticated';

      // ====== 鉴权守卫 ======
      var allDialogs = [];
      var profilesMap = {};

      function $(id) { return document.getElementById(id); }

      function checkAuth() {
        if (sessionStorage.getItem(STORAGE_KEY) !== '1') {
          showAuthOverlay();
          return false;
        }
        return true;
      }

      function showAuthOverlay() {
        // 隐藏主内容
        document.querySelector('.dashboard-container').style.display = 'none';

        var overlay = document.createElement('div');
        overlay.className = 'auth-overlay';
        overlay.id = 'authOverlay';
        overlay.innerHTML =
          '<div class="auth-box">' +
            '<h2>🔐 管理员验证</h2>' +
            '<p class="auth-sub">请输入管理员密码以访问仪表盘</p>' +
            '<input type="password" id="authPwdInput" placeholder="输入密码" autofocus>' +
            '<div class="auth-error" id="authError">密码错误，请重试</div>' +
            '<div class="auth-actions">' +
              '<button class="auth-btn-cancel" id="authCancel">取消</button>' +
              '<button class="auth-btn-confirm" id="authConfirm">确认</button>' +
            '</div>' +
          '</div>';
        document.body.appendChild(overlay);

        var input = $('authPwdInput');
        setTimeout(function() { input.focus(); }, 100);

        $('authConfirm').addEventListener('click', function() { verifyAndProceed(); });
        input.addEventListener('keydown', function(e) { if (e.key === 'Enter') verifyAndProceed(); });
        $('authCancel').addEventListener('click', function() { window.location.href = 'index.html'; });
      }

      function verifyAndProceed() {
        var input = $('authPwdInput');
        var errorEl = $('authError');
        if (input.value === ADMIN_PASSWORD) {
          sessionStorage.setItem(STORAGE_KEY, '1');
          var overlay = $('authOverlay');
          if (overlay) overlay.remove();
          document.querySelector('.dashboard-container').style.display = '';
          loadData();
        } else {
          errorEl.style.display = 'block';
          input.value = '';
          input.focus();
        }
      }

      // 检查鉴权
      if (!checkAuth()) return;

      // ====== 数据加载 ======
      async function loadData() {
        var apiBase = window.API_BASE || '';
        try {
          var res = await fetch(apiBase + '/api/admin', {
            headers: { 'Authorization': 'Bearer ' + ADMIN_PASSWORD }
          });
          if (!res.ok) {
            $('contentArea').innerHTML = '<div class="error-state">数据加载失败 (HTTP ' + res.status + ')：请确保已配置 SUPABASE_SERVICE_KEY 环境变量</div>';
            return;
          }
          var data = await res.json();
          allDialogs = data.aiDialogs || [];
          (data.profiles || []).forEach(function(p) {
            profilesMap[p.user_id] = p.nickname || '未命名';
          });

          if (data.aiDialogsError) {
            $('contentArea').innerHTML = '<div class="error-state">AI 对话数据加载失败：' + data.aiDialogsError + '<br><small>请确保 ai_dialogs 表已在 Supabase 中创建（执行 migrations/add_ai_dialogs.sql）</small></div>';
            return;
          }

          renderAll();
        } catch (e) {
          $('contentArea').innerHTML = '<div class="error-state">网络错误：' + e.message + '<br><small>请确保 API 服务器已启动（node dev-server.cjs）</small></div>';
        }
      }

      // ====== 数据分组与搜索 ======
      function getGroupedData(searchText) {
        var filtered = allDialogs;
        if (searchText) {
          var lower = searchText.toLowerCase();
          filtered = allDialogs.filter(function(d) {
            var nickname = (profilesMap[d.user_id] || '').toLowerCase();
            return nickname.indexOf(lower) !== -1 ||
                   d.user_message.toLowerCase().indexOf(lower) !== -1 ||
                   d.ai_reply.toLowerCase().indexOf(lower) !== -1 ||
                   d.user_id.toLowerCase().indexOf(lower) !== -1;
          });
        }

        // 按 user_id 分组，组内按时间倒序
        var groups = {};
        filtered.forEach(function(d) {
          if (!groups[d.user_id]) {
            groups[d.user_id] = { user_id: d.user_id, nickname: profilesMap[d.user_id] || '未命名', dialogs: [] };
          }
          groups[d.user_id].dialogs.push(d);
        });

        // 每组内按时间倒序
        Object.values(groups).forEach(function(g) {
          g.dialogs.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });
        });

        // 组按最近对话时间排序
        var result = Object.values(groups);
        result.sort(function(a, b) {
          var ta = a.dialogs[0] ? new Date(a.dialogs[0].created_at) : 0;
          var tb = b.dialogs[0] ? new Date(b.dialogs[0].created_at) : 0;
          return tb - ta;
        });

        return { groups: result, total: filtered.length };
      }

      // ====== 渲染 ======
      function renderAll() {
        var searchText = ($('searchInput').value || '').trim();
        var data = getGroupedData(searchText);

        // 统计
        var uniqueUsers = new Set(allDialogs.map(function(d) { return d.user_id; })).size;
        $('statDialogs').textContent = allDialogs.length;
        $('statUsers').textContent = uniqueUsers;
        $('statFloat').textContent = allDialogs.filter(function(d) { return d.session_type === 'float'; }).length;
        $('statShuling').textContent = allDialogs.filter(function(d) { return d.session_type === 'shuling'; }).length;

        // 内容区
        if (data.groups.length === 0) {
          $('contentArea').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无对话记录</p></div>';
          return;
        }

        var html = '<div>搜索到 <strong>' + data.total + '</strong> 条对话（' + data.groups.length + ' 个用户）</div>';
        data.groups.forEach(function(g, gi) {
          var groupId = 'group-' + gi;
          html += '<div class="user-group open" id="' + groupId + '">';
          html += '<div class="user-group-header" onclick="document.getElementById(\'' + groupId + '\').classList.toggle(\'open\')">';
          html += '<div class="user-info">';
          html += '<span class="user-nickname">' + escapeHtml(g.nickname) + '</span>';
          html += '<span class="user-id">' + escapeHtml(g.user_id.substring(0, 12)) + '...</span>';
          html += '</div>';
          html += '<div class="user-meta">';
          html += '<span>' + g.dialogs.length + ' 条对话</span>';
          html += '<span>' + formatDate(g.dialogs[0].created_at) + '</span>';
          html += '<span class="expand-icon">▼</span>';
          html += '</div>';
          html += '</div>';

          html += '<div class="user-group-body">';
          g.dialogs.forEach(function(d) {
            var badgeClass = d.session_type === 'float' ? 'float' : 'shuling';
            var badgeText = d.session_type === 'float' ? '浮窗树灵' : '树灵页面';
            var time = d.created_at ? new Date(d.created_at).toLocaleString('zh-CN') : '';

            html += '<div class="dialog-entry">';
            html += '<div class="dialog-meta">';
            html += '<span class="session-badge ' + badgeClass + '">' + badgeText + '</span>';
            html += '<span>' + time + '</span>';
            html += '</div>';
            html += '<div class="dialog-msg user-msg"><span class="label">💬 用户：</span><span class="content">' + highlightText(escapeHtml(d.user_message), searchText) + '</span></div>';
            html += '<div class="dialog-msg ai-msg"><span class="label">🌿 树灵：</span><span class="content">' + highlightText(escapeHtml(d.ai_reply), searchText) + '</span></div>';
            html += '</div>';
          });
          html += '</div>';
          html += '</div>';
        });

        $('contentArea').innerHTML = html;
      }

      function highlightText(text, search) {
        if (!search) return text;
        var escaped = search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        var regex = new RegExp('(' + escaped + ')', 'gi');
        return text.replace(regex, '<span class="highlight">$1</span>');
      }

      // ====== CSV 导出 ======
      function exportCSV() {
        if (allDialogs.length === 0) { alert('无数据可导出'); return; }

        var BOM = '﻿';
        var header = '用户ID,昵称,会话类型,用户消息,AI回复,时间\n';
        var rows = allDialogs.map(function(d) {
          var nickname = profilesMap[d.user_id] || '未命名';
          var type = d.session_type === 'float' ? '浮窗树灵' : '树灵页面';
          var time = d.created_at ? new Date(d.created_at).toLocaleString('zh-CN') : '';
          return csvEscape(d.user_id) + ',' +
                 csvEscape(nickname) + ',' +
                 csvEscape(type) + ',' +
                 csvEscape(d.user_message) + ',' +
                 csvEscape(d.ai_reply) + ',' +
                 csvEscape(time);
        }).join('\n');

        var blob = new Blob([BOM + header + rows], { type: 'text/csv;charset=utf-8;' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'ai_dialogs_' + new Date().toISOString().slice(0, 10) + '.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function csvEscape(str) {
        if (!str) return '';
        var s = String(str).replace(/"/g, '""');
        if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
          s = '"' + s + '"';
        }
        return s;
      }

      // ====== 事件绑定 ======
      function init() {
        $('btnExport').addEventListener('click', exportCSV);
        $('btnBack').addEventListener('click', function() {
          window.location.href = 'index.html';
        });

        var searchTimer = null;
        $('searchInput').addEventListener('input', function() {
          var val = this.value.trim();
          var clearBtn = $('clearSearch');
          if (val) { clearBtn.classList.add('visible'); }
          else { clearBtn.classList.remove('visible'); }

          clearTimeout(searchTimer);
          searchTimer = setTimeout(renderAll, 250);
        });

        $('clearSearch').addEventListener('click', function() {
          $('searchInput').value = '';
          this.classList.remove('visible');
          renderAll();
        });

        loadData();
      }

      // escapeHtml, formatDate 由 utils.js 全局提供

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
