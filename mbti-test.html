  <div class="test-container">
    <h1 class="test-title">MBTI 性格测试</h1>
    <p class="test-subtitle">共 20 题，请根据你的真实反应选择最接近的一项</p>
    <div id="questionsContainer"></div>
    <button id="submitTestBtn" class="submit-btn">提交测试</button>
    <div id="resultContainer" style="display:none;"></div>
  </div>

  <script>
    // 优先使用全局实例，不存在则降级创建
    const sb = window.TreeHole?.supabase || supabase.createClient(
      'https://oazntpskcghfxzcylnef.supabase.co',
      'sb_publishable_5i3Z5mF3VCwoEaXPaIJebA_55H6w13g'
    );

    // 题库：20题，每题选项对应维度
    const questions = [
      { text: "在聚会中，你通常：", options: [{ text: "与很多人交流，感到精力充沛", dim: "E" }, { text: "只与少数熟人交谈，感到舒适", dim: "I" }] },
      { text: "你更倾向于：", options: [{ text: "先思考再行动", dim: "I" }, { text: "边行动边思考", dim: "E" }] },
      { text: "空闲时你更喜欢：", options: [{ text: "和朋友一起出去玩", dim: "E" }, { text: "独自在家看书或看电影", dim: "I" }] },
      { text: "认识新朋友时你：", options: [{ text: "主动开启话题", dim: "E" }, { text: "等待对方先开口", dim: "I" }] },
      { text: "电话铃响时你：", options: [{ text: "立刻接起，不管是谁", dim: "E" }, { text: "先看来电显示再决定", dim: "I" }] },
      { text: "你更关注：", options: [{ text: "具体的细节和事实", dim: "S" }, { text: "整体框架和可能性", dim: "N" }] },
      { text: "学习新事物时你：", options: [{ text: "喜欢按步骤练习", dim: "S" }, { text: "先理解概念再尝试", dim: "N" }] },
      { text: "描述一个物体时你：", options: [{ text: "注意颜色、形状等感官细节", dim: "S" }, { text: "联想到它的象征意义或用途", dim: "N" }] },
      { text: "你认为更重要的是：", options: [{ text: "实际经验", dim: "S" }, { text: "直觉灵感", dim: "N" }] },
      { text: "旅行时你更依赖：", options: [{ text: "详细攻略和地图", dim: "S" }, { text: "随意探索，跟着感觉走", dim: "N" }] },
      { text: "做决定时你偏向：", options: [{ text: "逻辑分析，客观公正", dim: "T" }, { text: "考虑他人感受，和谐为重", dim: "F" }] },
      { text: "朋友向你倾诉时你：", options: [{ text: "帮他们分析问题，提供解决方案", dim: "T" }, { text: "先安抚情绪，表示理解", dim: "F" }] },
      { text: "你认为自己是：", options: [{ text: "头脑冷静，注重原则", dim: "T" }, { text: "心地柔软，注重人情", dim: "F" }] },
      { text: "面对批评你：", options: [{ text: "关注批评是否合理，冷静对待", dim: "T" }, { text: "容易感到受伤，在乎对方态度", dim: "F" }] },
      { text: "工作中你更欣赏：", options: [{ text: "高效但可能有点严厉的领导", dim: "T" }, { text: "温和但可能效率一般的领导", dim: "F" }] },
      { text: "你的生活方式偏向：", options: [{ text: "有条理，喜欢计划", dim: "J" }, { text: "随性，喜欢灵活变通", dim: "P" }] },
      { text: "任务截止前你通常：", options: [{ text: "提前完成，留出缓冲", dim: "J" }, { text: "最后一刻冲刺完成", dim: "P" }] },
      { text: "桌面或房间：", options: [{ text: "整理得井井有条", dim: "J" }, { text: "有点乱但你知道东西在哪", dim: "P" }] },
      { text: "对于规则和制度：", options: [{ text: "倾向于遵守，给人可靠感", dim: "J" }, { text: "觉得束缚，喜欢自由度", dim: "P" }] },
      { text: "购物时你：", options: [{ text: "列好清单，直奔目标", dim: "J" }, { text: "随意逛，看到喜欢的就买", dim: "P" }] }
    ];

    let selectedAnswers = new Array(20).fill(null); // 存储每题选中的维度

    function renderQuestions() {
      const container = document.getElementById('questionsContainer');
      container.innerHTML = '';
      questions.forEach((q, idx) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `
          <div class="question-text">${idx+1}. ${q.text}</div>
          <div class="options" id="q-${idx}">
            ${q.options.map((opt, optIdx) => `
              <div class="option-btn" data-dim="${opt.dim}" data-q="${idx}">${opt.text}</div>
            `).join('')}
          </div>
        `;
        container.appendChild(card);
      });

      // 选项点击事件
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const qIdx = parseInt(this.dataset.q);
          const dim = this.dataset.dim;
          // 移除同题其他选项的选中状态
          document.querySelectorAll(`#q-${qIdx} .option-btn`).forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          selectedAnswers[qIdx] = dim;
        });
      });
    }

    function calculateResult() {
      const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
      selectedAnswers.forEach(dim => { if (dim) scores[dim]++; });
      const type = (scores.E >= scores.I ? 'E' : 'I') +
                   (scores.S >= scores.N ? 'S' : 'N') +
                   (scores.T >= scores.F ? 'T' : 'F') +
                   (scores.J >= scores.P ? 'J' : 'P');
      return { scores, type };
    }

    document.getElementById('submitTestBtn').addEventListener('click', async () => {
      if (selectedAnswers.includes(null)) {
        alert('请回答所有题目后再提交');
        return;
      }
      const { scores, type } = calculateResult();
      const descriptions = {
        "INTJ": "建筑师：富有战略眼光，独立且坚定。",
        "INTP": "逻辑学家：创新、好奇，喜爱探索理论。",
        "ENTJ": "指挥官：大胆、富有想象力，天生的领导者。",
        "ENTP": "辩论家：聪明、好奇，享受智力挑战。",
        "INFJ": "提倡者：安静而神秘，富有理想和同情心。",
        "INFP": "调停者：诗意、利他，总是想帮助他人。",
        "ENFJ": "主人公：富有魅力，激励人心，关心他人。",
        "ENFP": "竞选者：热情、创意，热爱社交和新点子。",
        "ISTJ": "物流师：务实、严谨，可靠且有条理。",
        "ISFJ": "守卫者：忠诚、体贴，保护所爱之人。",
        "ESTJ": "总经理：高效、果断，管理能力强。",
        "ESFJ": "执政官：热心、爱交际，总是照顾他人。",
        "ISTP": "鉴赏家：大胆、实际，喜欢动手操作。",
        "ISFP": "探险家：灵活、迷人，随时准备探索新事物。",
        "ESTP": "企业家：聪明、精力充沛，享受冒险。",
        "ESFP": "表演者：自发、热情，给周围带来欢乐。"
      };
      const desc = descriptions[type] || "独特的你，有着独一无二的特质。";
      const html = `
        <div class="result-box">
          <div class="result-type">${type}</div>
          <div class="result-desc">${desc}</div>
          <div class="dimension-scores">
            <div class="dim-item">E/I<br><span>${scores.E} : ${scores.I}</span></div>
            <div class="dim-item">S/N<br><span>${scores.S} : ${scores.N}</span></div>
            <div class="dim-item">T/F<br><span>${scores.T} : ${scores.F}</span></div>
            <div class="dim-item">J/P<br><span>${scores.J} : ${scores.P}</span></div>
          </div>
          <button id="saveMbtiBtn" class="save-btn">保存结果到我的资料</button>
          <div id="saveMsg" class="smooth-text"></div>
        </div>
      `;
      const resultContainer = document.getElementById('resultContainer');
      resultContainer.innerHTML = html;
      resultContainer.style.display = 'block';
      document.getElementById('submitTestBtn').style.display = 'none';

      // 保存按钮事件
      document.getElementById('saveMbtiBtn').addEventListener('click', async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { alert('请先登录'); return; }
        const saveMsg = document.getElementById('saveMsg');
        try {
          const response = await fetch(
            `https://oazntpskcghfxzcylnef.supabase.co/rest/v1/profiles?user_id=eq.${session.user.id}`,
            { method: 'PATCH',
              headers: {
                'Content-Type': 'application/json',
                'apikey': 'sb_publishable_5i3Z5mF3VCwoEaXPaIJebA_55H6w13g',
                'Authorization': `Bearer ${session.access_token}`,
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({ mbti: type })
            }
          );
          if (!response.ok) throw new Error('保存失败');
          updateTextSmoothly('saveMsg', '✅ 结果已保存到个人资料');
          saveMsg.className = 'smooth-text success';
          setTimeout(() => { window.location.href = 'profile.html'; }, 1500);
        } catch (err) {
          updateTextSmoothly('saveMsg', '保存失败：' + err.message);
          saveMsg.className = 'smooth-text error';
        }
      });
    });

    function updateTextSmoothly(elementId, newText) {
      const element = document.getElementById(elementId);
      if (!element) return;
      const currentText = element.textContent;
      if (currentText === newText) return;
      
      const duration = 200;
      const startTime = Date.now();
      
      function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        if (progress < 1) {
          element.style.opacity = 1 - progress;
          requestAnimationFrame(animate);
        } else {
          element.textContent = newText;
          element.style.opacity = 1;
        }
      }
      
      animate();
    }

    // 初始化
    window.addEventListener('DOMContentLoaded', async () => {
      renderQuestions();
      // 导航栏状态（复用之前的逻辑）
      const navGuest = document.getElementById('navGuest');
      const navLoggedIn = document.getElementById('navLoggedIn');
      const navNickname = document.getElementById('navNickname');
      const navLogout = document.getElementById('navLogout');
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        navGuest.style.display = 'none';
        navLoggedIn.style.display = 'inline';
        const { data: profile } = await sb.from('profiles').select('nickname').eq('user_id', user.id).single();
        navNickname.textContent = profile?.nickname || '树友';
        navLogout.addEventListener('click', (e) => { e.preventDefault(); sb.auth.signOut().then(() => window.location.href='welcome.html'); });
      }
    });
  </script>
