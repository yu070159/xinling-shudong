  <style>
    body { margin: 0; padding: 0; background: var(--bg-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
    .welcome-container { text-align: center; padding: 40px 20px; }
    .welcome-icon { font-size: 72px; animation: floatIcon 3s ease-in-out infinite; }
    @keyframes floatIcon { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .welcome-title { font-size: 36px; color: var(--accent); margin: 20px 0 10px; font-weight: 700; }
    .welcome-button { display: inline-block; margin-top: 30px; padding: 14px 48px; background: var(--accent); color: white; border-radius: 30px; text-decoration: none; font-size: 18px; font-weight: 600; transition: all 0.3s; cursor: pointer; border: none; }
    .welcome-button:hover { transform: scale(1.05); box-shadow: 0 6px 24px var(--accent-glow); }
    .welcome-footer { margin-top: 60px; color: var(--text-secondary); font-size: 13px; }
    .welcome-links { margin-top: 20px; }
    .welcome-links a { color: var(--text-secondary); text-decoration: none; margin: 0 12px; font-size: 14px; transition: color 0.2s; }
    .welcome-links a:hover { color: var(--accent); }
    #welcomeUser { color: var(--accent); font-size: 16px; margin-bottom: 10px; display: none; }
    .welcome-secondary-link { display: inline-block; padding: 10px 24px; border: 1px solid var(--border-medium); color: var(--accent); border-radius: 20px; text-decoration: none; font-size: 14px; transition: all 0.3s; }
    .welcome-secondary-link:hover { background: var(--accent-glow); border-color: var(--accent); }
  </style>

<body>
  <div class="welcome-container">
    <div class="welcome-icon">🌳</div>
    <h1 class="welcome-title">心灵树洞</h1>
    <p class="welcome-subtitle">卸下白昼的疲惫，把心事交给夜风与篝火</p>
    <div id="welcomeUser"></div>
    <a href="index.html" class="welcome-button">提灯入林</a>
    <div id="welcomeActions" style="display: none; margin-top: 16px; gap: 12px; justify-content: center; flex-wrap: wrap;">
      <a href="chat.html" class="welcome-secondary-link">💬 树友对话</a>
      <a href="books.html" class="welcome-secondary-link">📚 探索书洞</a>
    </div>
    <div class="welcome-links">
      <a href="login.html">登录</a>
      <a href="register.html">注册</a>
    </div>
    <p class="welcome-footer">夜色会隐去你的姓名，落叶会守口如瓶</p>
  </div>

  <script>
    // 确保 DOM 加载完成后再执行登录状态检查
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        // 检查 supabase SDK 是否已正确加载
        if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
          console.warn('Supabase SDK 未加载或不可用，跳过登录状态检查');
          return;
        }

        const sb = window.supabase.createClient(
          'https://oazntpskcghfxzcylnef.supabase.co',
          'sb_publishable_5i3Z5mF3VCwoEaXPaIJebA_55H6w13g'
        );

        const { data: { user } } = await sb.auth.getUser();

        // 仅当用户已登录时才执行以下操作
        if (user) {
          const welcomeUserEl = document.getElementById('welcomeUser');
          if (welcomeUserEl) {
            welcomeUserEl.style.display = 'block';
            try {
              const { data: profile } = await sb.from('profiles')
                .select('nickname')
                .eq('user_id', user.id)
                .single();
              welcomeUserEl.textContent = '欢迎回来，' + (profile?.nickname || '树友');
            } catch (profileErr) {
              console.warn('获取用户资料失败:', profileErr);
              welcomeUserEl.textContent = '欢迎回来，树友';
            }
          }

          // 修改主按钮文字
          const welcomeButton = document.querySelector('.welcome-button');
          if (welcomeButton) {
            welcomeButton.textContent = '回到树洞';
          }

          // 显示额外的快捷入口
          const welcomeActions = document.getElementById('welcomeActions');
          if (welcomeActions) {
            welcomeActions.style.display = 'flex';
          }
        }
      } catch (error) {
        // 捕获任何未预期的错误，避免控制台红屏
        console.error('欢迎页初始化错误:', error.message);
      }
    });
  </script>

  <script src="ai-float.js"></script>
  <script src="user-popup.js"></script>
</body>
