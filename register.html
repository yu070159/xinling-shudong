<body>

              <a href="login.html">登录</a>

              <a href="profile.html">个人中心</a>
              <a href="feedback.html">反馈</a>
              <a href="#" class="logout-btn" id="navLogout">退出</a>
          </span>
      </div>
  </header>
  <div class="container">
    <div class="login-container">
      <div class="login-icon">🌱</div>
      <h2 class="login-title">加入心灵树洞</h2>
      <div id="regError" class="smooth-text"></div>
      <input type="email" id="regEmail" class="login-input" placeholder="输入你的邮箱">
      <input type="text" id="regNickname" class="login-input" placeholder="你的昵称（选填）">
      <input type="password" id="regPassword" class="login-input" placeholder="密码，至少6位">
      <button id="regBtn">成为树友</button>
      <div class="login-footer">
        <div class="login-hint">你的邮箱不会公开，仅用于登录</div>
        已有账号？<a href="login.html">登录</a>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const regBtn = document.getElementById('regBtn');
      const regEmail = document.getElementById('regEmail');
      const regNickname = document.getElementById('regNickname');
      const regPassword = document.getElementById('regPassword');
      const regError = document.getElementById('regError');
      
      const navGuest = document.getElementById('navGuest');
      const navLoggedIn = document.getElementById('navLoggedIn');
      const navNickname = document.getElementById('navNickname');
      const navLogout = document.getElementById('navLogout');
      
      if (navGuest && navLoggedIn) {
        const user = await TreeHole.getCurrentUser();
        if (user) {
          navGuest.style.display = 'none';
          navLoggedIn.style.display = 'inline';
          const profile = await TreeHole.getUserProfile();
          navNickname.textContent = profile?.nickname || '树友';
        } else {
          navGuest.style.display = 'inline';
          navLoggedIn.style.display = 'none';
        }
      }
      
      if (navLogout) {
        navLogout.addEventListener('click', (e) => {
          e.preventDefault();
          TreeHole.signOut();
        });
      }
      
      const handleRegister = async () => {
        const email = regEmail.value.trim();
        const nickname = regNickname.value.trim();
        const password = regPassword.value.trim();
        
        regError.style.display = 'none';
        
        if (!email) {
          updateTextSmoothly('regError', '请填写邮箱');
          regError.style.display = 'block';
          return;
        }
        
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          updateTextSmoothly('regError', '请输入正确的邮箱格式');
          regError.style.display = 'block';
          return;
        }
        
        if (!password) {
          updateTextSmoothly('regError', '请设置密码');
          regError.style.display = 'block';
          return;
        }
        
        if (password.length < 6) {
          updateTextSmoothly('regError', '密码至少需要6位');
          regError.style.display = 'block';
          return;
        }
        
        const originalText = regBtn.textContent;
        regBtn.textContent = '正在注册...';
        regBtn.disabled = true;
        
        const result = await TreeHole.signUp(email, password, nickname);
        
        regBtn.textContent = originalText;
        regBtn.disabled = false;
        
        if (!result.success) {
          updateTextSmoothly('regError', result.error || '注册失败，请重试');
          regError.style.display = 'block';
        }
      };
      
      regBtn.addEventListener('click', handleRegister);
      
      [regEmail, regNickname, regPassword].forEach(input => {
        input.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            handleRegister();
          }
        });
      });
    });

    function updateTextSmoothly(elementId, newText) {
      const element = document.getElementById(elementId);
      if (!element) return;
      const currentText = element.textContent;
      if (currentText === newText) return;
      
      const duration = 200;
      const startTime = Date.now();
      
      function animate() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        if (progress < 1) {
          element.style.opacity = 1 - progress;
          requestAnimationFrame(animate);
        } else {
          element.textContent = newText;
          element.style.opacity = 1;
        }
      }
      
      animate();
    }
  </script>

  <script src="ai-float.js"></script>
