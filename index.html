  <div class="container">
    <header class="header">
      <h1>🌳 心灵树洞</h1>
      <p class="subtitle">悄悄话，说给树洞听</p>
    </header>

    <div class="daily-whisper" id="dailyWhisper" style="display:none;">
      <span class="daily-whisper-text" id="dailyWhisperText"></span>
    </div>

    <section class="submit-form card">
      <p class="form-guide-text">把情绪折成落叶，总有一簇篝火为你而燃</p>
      <textarea id="question-content" placeholder="写下你的心事..." rows="3"></textarea>
      <div id="question-msg" class="form-message"></div>
      <div class="form-row">
        <div class="form-row-input-wrapper">
          <input type="text" id="question-nickname" placeholder="匿名树友" maxlength="20">
          <span id="login-status" class="login-status">已登录，将以此昵称发布</span>
        </div>
        <button id="submit-question-btn">📮 投入树洞</button>
      </div>
    </section>

    <div class="search-container">
      <input type="text" id="searchInput" placeholder="搜索心事...">
      <span id="clearSearch" class="clear-search">×</span>
    </div>

    <section class="questions-list" id="questions-list">
    </section>
  </div>

  <div class="login-modal-overlay" id="loginModal">
    <div class="login-modal">
      <p>登录后才能写下心事哦</p>
      <div class="login-modal-buttons">
        <button class="login-modal-btn login-modal-btn-primary" onclick="location.href='login.html'">去登录</button>
        <button class="login-modal-btn login-modal-btn-secondary" onclick="document.getElementById('loginModal').style.display='none'">再想想</button>
      </div>
    </div>

  <script src="ai-float.js"></script>
  <script src="user-popup.js"></script>
  <script>
    (async function() {
      const el = document.getElementById('dailyWhisper');
      const textEl = document.getElementById('dailyWhisperText');
      if (!el || !textEl) return;

      const today = new Date().toISOString().slice(0, 10);
      const cacheKey = 'daily_whisper_' + today;
      const cached = localStorage.getItem(cacheKey);

      if (cached) {
        textEl.textContent = cached;
        el.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(window.API_BASE + '/api/gemini', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: '请生成一句温暖的治愈语录，风格诗意含蓄、像深夜森林里的轻声细语。不超过30字，不要引号。主题围绕：接纳自己、允许脆弱、慢慢来。'
          })
        });
        const data = await res.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
        if (text) {
          textEl.textContent = text;
          el.style.display = 'block';
          localStorage.setItem(cacheKey, text);
        }
      } catch (e) {
        // 静默失败，不影响页面
      }
    })();
  </script>
