  <style>
    .detail-container { max-width: 680px; margin: 0 auto; padding: 20px; padding-top: 80px; display: flex; flex-direction: column; height: calc(100vh - 80px); color: var(--text-primary); }
    .msg-header { display: flex; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border-light); margin-bottom: 15px; }
    .back-link { color: var(--text-secondary); text-decoration: none; margin-right: 15px; }
    .back-link:hover { color: var(--text-primary); }
    .msg-list { flex: 1; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 10px 16px; border-radius: 18px; word-break: break-word; }
    .msg-sent { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
    .msg-received { align-self: flex-start; background: var(--bg-card); color: var(--text-primary); border-bottom-left-radius: 4px; border: 1px solid var(--border-light); }
    .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .input-area { display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid var(--border-light); }
    .input-area textarea { flex: 1; padding: 12px; border-radius: 12px; background: var(--bg-input); border: 1px solid var(--border-medium); color: var(--text-primary); resize: none; height: 50px; }
    .send-btn { background: var(--accent); border: none; color: white; padding: 0 20px; border-radius: 12px; cursor: pointer; }
  </style>
</head>
<body>
  <header class="forest-header">
      <a href="index.html" class="forest-logo">
          <span class="logo-icon">🌳</span>
          <span class="logo-text">心灵树洞</span>
      </a>
      <nav class="forest-nav">
          <a href="index.html">广场</a>
          <a href="books.html">书洞</a>
          <a href="shuling.html">树灵</a>
          <a href="chat.html">树友对话</a>
      </nav>
      <div class="forest-user-actions" id="navUserArea">
          <span id="navGuest">
              <a href="login.html">登录</a>
              <a href="register.html">注册</a>
          </span>
          <span id="navLoggedIn" style="display:none">
              <span class="user-greeting" id="navNickname"></span>
              <a href="profile.html">个人中心</a>
              <a href="feedback.html">反馈</a>
              <a href="#" class="logout-btn" id="navLogout">退出</a>
          </span>
      </div>
  </header>
  <div class="detail-container">
    <div class="msg-header">
      <a href="chat.html" class="back-link">← 返回</a>
      <span id="partnerName">加载中...</span>
    </div>
    <div id="msgList" class="msg-list"></div>
    <div class="input-area">
      <textarea id="msgInput" placeholder="写下你想说的话..."></textarea>
      <button id="sendBtn" class="send-btn">发送</button>
    </div>
  </div>

  <script>
    const sb = supabase.createClient('https://oazntpskcghfxzcylnef.supabase.co', 'sb_publishable_5i3Z5mF3VCwoEaXPaIJebA_55H6w13g');
    const urlParams = new URLSearchParams(window.location.search);
    const partnerId = urlParams.get('user');

    async function loadMessages() {
      const { data: { user } } = await sb.auth.getUser();
      if (!user || !partnerId) { window.location.href = 'chat.html'; return; }

      await sb.from('messages').update({ is_read: true }).eq('sender_id', partnerId).eq('receiver_id', user.id);

      const { data: messages } = await sb.from('messages').select('*')
        .or(`and(sender_id.eq.${user.id},receiver_id.eq.${partnerId}),and(sender_id.eq.${partnerId},receiver_id.eq.${user.id})`)
        .order('created_at', { ascending: true });

      const list = document.getElementById('msgList');
      list.innerHTML = '';
      if (messages) messages.forEach(msg => {
        const isSent = msg.sender_id === user.id;
        const div = document.createElement('div');
        div.className = `msg ${isSent ? 'msg-sent' : 'msg-received'}`;
        div.innerHTML = `${msg.content}<div class="msg-time">${new Date(msg.created_at).toLocaleTimeString()}</div>`;
        list.appendChild(div);
      });
      list.scrollTop = list.scrollHeight;
    }

    document.getElementById('sendBtn').addEventListener('click', async () => {
      const input = document.getElementById('msgInput');
      const content = input.value.trim();
      if (!content) return;
      const { data: { user } } = await sb.auth.getUser();
      if (!user) return;
      await sb.from('messages').insert([{ sender_id: user.id, receiver_id: partnerId, content }]);
      input.value = '';
      loadMessages();
    });

    window.addEventListener('DOMContentLoaded', async () => {
      const navGuest = document.getElementById('navGuest');
      const navLoggedIn = document.getElementById('navLoggedIn');
      const navNickname = document.getElementById('navNickname');
      const navLogout = document.getElementById('navLogout');

      const { data: { user } } = await sb.auth.getUser();
      if (!user) { window.location.href = 'welcome.html'; return; }

      // 更新导航栏状态
      navGuest.style.display = 'none';
      navLoggedIn.style.display = 'inline';
      const { data: myProfile } = await sb.from('profiles').select('nickname').eq('user_id', user.id).single();
      navNickname.textContent = myProfile?.nickname || '树友';
      navLogout.addEventListener('click', (e) => { e.preventDefault(); sb.auth.signOut().then(() => window.location.href='welcome.html'); });

      // 加载对方昵称和消息
      const { data: partnerProfile } = await sb.from('profiles').select('nickname').eq('user_id', partnerId).single();
      document.getElementById('partnerName').textContent = partnerProfile?.nickname || '未知树友';
      loadMessages();
      setInterval(loadMessages, 5000);
    });
  </script>

  <script src="ai-float.js"></script>
</body>
</html>
